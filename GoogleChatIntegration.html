<!-- GoogleChatIntegration.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col s12">
          <h3 class="light-blue-text text-darken-4">Integração com Google Chat</h3>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Enviar Mensagem para o Google Chat</h5>
            <form id="sendChatMessageForm">
              <div class="input-field">
                <input id="chatSpaceName" type="text" class="validate" required>
                <label for="chatSpaceName">Nome do Espaço do Chat (ou ID)</label>
              </div>
              <div class="input-field">
                <textarea id="chatMessageContent" class="materialize-textarea" required></textarea>
                <label for="chatMessageContent">Conteúdo da Mensagem</label>
              </div>
              <button class="btn waves-effect waves-light" type="submit" name="action" style="margin-top: 20px;">
                Enviar Mensagem
                <i class="material-icons right">send</i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Configurar Notificações do Chat</h5>
            <p>Configure quais eventos devem disparar notificações no Google Chat.</p>
            <form id="chatNotificationSettingsForm">
              <div class="switch">
                <label>
                  Desativado
                  <input type="checkbox" id="notifyProjectUpdates">
                  <span class="lever"></span>
                  Notificar Atualizações de Projeto
                </label>
              </div>
              <div class="switch">
                <label>
                  Desativado
                  <input type="checkbox" id="notifyTaskAssignments">
                  <span class="lever"></span>
                  Notificar Atribuições de Tarefas
                </label>
              </div>
              <button class="btn waves-effect waves-light" type="submit" name="action" style="margin-top: 20px;">
                Salvar Configurações
                <i class="material-icons right">save</i>
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        loadChatNotificationSettings();
      });

      document.getElementById("sendChatMessageForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var spaceName = document.getElementById("chatSpaceName").value;
        var messageContent = document.getElementById("chatMessageContent").value;

        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast(result.message, "success");
            document.getElementById("chatMessageContent").value = "";
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao enviar mensagem para o Google Chat: " + error.message, "error");
        }).apiSendGoogleChatMessage(spaceName, messageContent); // Supondo uma API para enviar mensagem
      });

      function loadChatNotificationSettings() {
        showLoading();
        google.script.run.withSuccessHandler(function(settings) {
          hideLoading();
          if (settings) {
            document.getElementById("notifyProjectUpdates").checked = settings.notifyProjectUpdates || false;
            document.getElementById("notifyTaskAssignments").checked = settings.notifyTaskAssignments || false;
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao carregar configurações de notificação do Chat: " + error.message, "error");
        }).apiGetChatNotificationSettings(); // Supondo uma API para obter configurações
      }

      document.getElementById("chatNotificationSettingsForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var settings = {
          notifyProjectUpdates: document.getElementById("notifyProjectUpdates").checked,
          notifyTaskAssignments: document.getElementById("notifyTaskAssignments").checked
        };
        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast(result.message, "success");
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao salvar configurações de notificação do Chat: " + error.message, "error");
        }).apiSaveChatNotificationSettings(settings); // Supondo uma API para salvar configurações
      });
    </script>
  </body>
</html>
