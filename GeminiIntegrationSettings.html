<!-- GeminiIntegrationSettings.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col s12">
          <h3 class="light-blue-text text-darken-4">Configurações de Integração Gemini</h3>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Chave da API Gemini</h5>
            <form id="geminiApiKeyForm">
              <div class="input-field">
                <input id="geminiApiKey" type="text" class="validate" required>
                <label for="geminiApiKey">Chave da API Gemini</label>
              </div>
              <button class="btn waves-effect waves-light" type="submit" name="action" style="margin-top: 20px;">
                Salvar Chave API
                <i class="material-icons right">save</i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Configurações de Uso da Gemini</h5>
            <form id="geminiUsageSettingsForm">
              <div class="switch">
                <label>
                  Desativado
                  <input type="checkbox" id="geminiProjectEvaluationFeedback">
                  <span class="lever"></span>
                  Feedback Automático em Avaliações de Projeto
                </label>
              </div>
              <div class="switch">
                <label>
                  Desativado
                  <input type="checkbox" id="geminiTaskSummarization">
                  <span class="lever"></span>
                  Sumarização Automática de Tarefas
                </label>
              </div>
              <button class="btn waves-effect waves-light" type="submit" name="action" style="margin-top: 20px;">
                Salvar Configurações de Uso
                <i class="material-icons right">save</i>
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        loadGeminiSettings();
      });

      function loadGeminiSettings() {
        showLoading();
        google.script.run.withSuccessHandler(function(settings) {
          hideLoading();
          if (settings) {
            document.getElementById("geminiApiKey").value = settings.apiKey || "";
            document.getElementById("geminiProjectEvaluationFeedback").checked = settings.projectEvaluationFeedbackEnabled || false;
            document.getElementById("geminiTaskSummarization").checked = settings.taskSummarizationEnabled || false;
            M.updateTextFields();
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao carregar configurações da Gemini: " + error.message, "error");
        }).apiGetGeminiIntegrationSettings(); // Supondo uma API para obter configurações da Gemini
      }

      document.getElementById("geminiApiKeyForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var apiKey = document.getElementById("geminiApiKey").value;
        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast(result.message, "success");
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao salvar chave da API Gemini: " + error.message, "error");
        }).apiSaveGeminiApiKey(apiKey);
      });

      document.getElementById("geminiUsageSettingsForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var usageSettings = {
          projectEvaluationFeedbackEnabled: document.getElementById("geminiProjectEvaluationFeedback").checked,
          taskSummarizationEnabled: document.getElementById("geminiTaskSummarization").checked
        };
        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast(result.message, "success");
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao salvar configurações de uso da Gemini: " + error.message, "error");
        }).apiSaveGeminiUsageSettings(usageSettings); // Supondo uma API para salvar configurações de uso da Gemini
      });
    </script>
  </body>
</html>
