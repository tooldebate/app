<!-- UserSettings.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col s12">
          <h3 class="light-blue-text text-darken-4">Configurações do Usuário</h3>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Preferências de Interface</h5>
            <form id="userPreferencesForm">
              <div class="input-field">
                <select id="themeSelect">
                  <option value="light">Claro</option>
                  <option value="dark">Escuro</option>
                </select>
                <label>Tema</label>
              </div>
              <div class="input-field">
                <select id="languageSelect">
                  <option value="pt-BR">Português (Brasil)</option>
                  <option value="en-US">English (US)</option>
                </select>
                <label>Idioma</label>
              </div>
              <button class="btn waves-effect waves-light" type="submit" name="action" style="margin-top: 20px;">
                Salvar Preferências
                <i class="material-icons right">save</i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Configurações de Segurança</h5>
            <form id="securitySettingsForm">
              <div class="switch">
                <label>
                  Desativado
                  <input type="checkbox" id="twoFactorAuth">
                  <span class="lever"></span>
                  Autenticação de Dois Fatores
                </label>
              </div>
              <button class="btn waves-effect waves-light" type="submit" name="action" style="margin-top: 20px;">
                Salvar Segurança
                <i class="material-icons right">security</i>
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var selects = document.querySelectorAll("select");
        M.FormSelect.init(selects);
        loadUserSettings();
      });

      function loadUserSettings() {
        showLoading();
        google.script.run.withSuccessHandler(function(settings) {
          hideLoading();
          if (settings) {
            document.getElementById("themeSelect").value = settings.theme || "light";
            document.getElementById("languageSelect").value = settings.language || "pt-BR";
            document.getElementById("twoFactorAuth").checked = settings.twoFactorAuthEnabled || false;
            M.FormSelect.init(document.getElementById("themeSelect"));
            M.FormSelect.init(document.getElementById("languageSelect"));
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao carregar configurações do usuário: " + error.message, "error");
        }).apiGetUserSettings(); // Supondo uma API para obter configurações do usuário
      }

      document.getElementById("userPreferencesForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var newSettings = {
          theme: document.getElementById("themeSelect").value,
          language: document.getElementById("languageSelect").value
        };
        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast(result.message, "success");
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao salvar preferências: " + error.message, "error");
        }).apiSaveUserSettings(newSettings); // Supondo uma API para salvar configurações do usuário
      });

      document.getElementById("securitySettingsForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var twoFactorAuthEnabled = document.getElementById("twoFactorAuth").checked;
        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast(result.message, "success");
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao salvar configurações de segurança: " + error.message, "error");
        }).apiSaveSecuritySettings(twoFactorAuthEnabled); // Supondo uma API para salvar configurações de segurança
      });
    </script>
  </body>
</html>
