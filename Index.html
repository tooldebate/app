<!-- Index.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>Sistema de Gestão Agentica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body { display: flex; min-height: 100vh; flex-direction: column; }
      main { flex: 1 0 auto; }
      .container { margin-top: 20px; }
      .card-panel { padding: 20px; margin-bottom: 20px; }
      .btn-floating { margin-right: 10px; }
      #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); z-index: 1000; justify-content: center; align-items: center; }
    </style>
  </head>
  <body>
    <header>
      <nav class="light-blue darken-4">
        <div class="nav-wrapper container">
          <a href="#" class="brand-logo">Sistema Agentico</a>
          <ul id="nav-mobile" class="right hide-on-med-and-down">
            <li><a href="#" onclick="google.script.run.apiLogout().then(loadLoginPage)">Sair</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <div class="container" id="app-content">
        <!-- Conteúdo principal da aplicação será carregado aqui -->
      </div>
    </main>

    <footer class="page-footer light-blue darken-4">
      <div class="footer-copyright">
        <div class="container">
          © 2026 Manus AI
          <a class="grey-text text-lighten-4 right" href="#!">Mais Informações</a>
        </div>
      </div>
    </footer>

    <div id="loading-overlay">
      <div class="preloader-wrapper active">
        <div class="spinner-layer spinner-blue-only">
          <div class="circle-clipper left">
            <div class="circle"></div>
          </div><div class="gap-patch">
            <div class="circle"></div>
          </div><div class="circle-clipper right">
            <div class="circle"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
      // JavaScript global para a aplicação
      document.addEventListener("DOMContentLoaded", function() {
        M.AutoInit();
        loadApp();
      });

      function showLoading() {
        document.getElementById("loading-overlay").style.display = "flex";
      }

      function hideLoading() {
        document.getElementById("loading-overlay").style.display = "none";
      }

      function showToast(message, type = 'success') {
        M.toast({html: message, classes: type === 'error' ? 'red darken-3' : 'green darken-3'});
      }

      function loadApp() {
        showLoading();
        google.script.run.withSuccessHandler(function(session) {
          hideLoading();
          if (session) {
            if (session.role === 'Administrador') {
              loadAdminDashboard();
            } else if (session.role === 'Funcionário') {
              loadEmployeeDashboard();
            }
          } else {
            loadLoginPage();
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao verificar sessão: ' + error.message, 'error');
          loadLoginPage();
        }).apiGetSessionUser();
      }

      function loadLoginPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit(); // Re-initialize Materialize components
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de login: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('Login');
      }

      function loadAdminDashboard() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          // Carregar dados do dashboard do admin
          google.script.run.withSuccessHandler(function(data) {
            renderAdminDashboard(data);
          }).withFailureHandler(function(error) {
            showToast('Erro ao carregar dados do dashboard do administrador: ' + error.message, 'error');
          }).apiGetAdminDashboardData();
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar dashboard do administrador: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('AdminDashboard');
      }

      function loadEmployeeDashboard() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          // Carregar dados do dashboard do funcionário
          google.script.run.withSuccessHandler(function(data) {
            renderEmployeeDashboard(data);
          }).withFailureHandler(function(error) {
            showToast('Erro ao carregar dados do dashboard do funcionário: ' + error.message, 'error');
          }).apiGetEmployeeDashboardData();
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar dashboard do funcionário: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('EmployeeDashboard');
      }

      // Funções de renderização de dashboard (serão implementadas em arquivos JS separados ou aqui)
      function renderAdminDashboard(data) {
        document.getElementById('total-users').innerText = data.totalUsers;
        document.getElementById('active-users').innerText = data.activeUsers;
        document.getElementById('total-projects').innerText = data.totalProjects;
        document.getElementById('active-projects').innerText = data.activeProjects;
        document.getElementById('pending-tasks').innerText = data.pendingTasks;
        document.getElementById('completed-tasks').innerText = data.completedTasks;
        document.getElementById('avg-adherence').innerText = data.averageAdherence + '%';
        document.getElementById('avg-understanding').innerText = data.averageUnderstanding + '%';
      }

      function renderEmployeeDashboard(data) {
        document.getElementById('my-projects-count').innerText = data.myProjectsCount;
        document.getElementById('my-pending-tasks').innerText = data.pendingMyTasks;
        document.getElementById('my-completed-tasks').innerText = data.completedMyTasks;
        document.getElementById('my-avg-adherence').innerText = data.averageAdherence + '%';
        document.getElementById('my-avg-understanding').innerText = data.averageUnderstanding + '%';
        // Renderizar tarefas recentes
        var recentTasksList = document.getElementById('recent-tasks-list');
        recentTasksList.innerHTML = '';
        if (data.recentTasks && data.recentTasks.length > 0) {
          data.recentTasks.forEach(function(task) {
            var li = document.createElement('li');
            li.className = 'collection-item';
            li.innerHTML = `<div>${task.Descricao}<a href="#!" class="secondary-content"><i class="material-icons">send</i></a></div>`;
            recentTasksList.appendChild(li);
          });
        } else {
          recentTasksList.innerHTML = '<li class="collection-item">Nenhuma tarefa recente.</li>';
        }
      }

      // Funções para carregar outras páginas (ex: gerenciamento de usuários, projetos, etc.)
      function loadUserManagementPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadUsersTable(); // Carregar dados da tabela de usuários
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de gerenciamento de usuários: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('UserManagement');
      }

      function loadProjectManagementPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadProjectsTable(); // Carregar dados da tabela de projetos
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de gerenciamento de projetos: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('ProjectManagement');
      }

      function loadTaskManagementPage(projectId = null) {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadTasksTable(projectId); // Carregar dados da tabela de tarefas
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de gerenciamento de tarefas: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('TaskManagement');
      }

      function loadEvaluationPage(projectId = null) {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadEvaluationsTable(projectId); // Carregar dados da tabela de avaliações
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de avaliações: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('Evaluation');
      }

      function loadReportPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de relatórios: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('Reports');
      }

      function loadSettingsPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadUserSettings();
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de configurações: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('Settings');
      }

      function loadGeminiChatPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadChatHistory();
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página do Gemini Chat: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('GeminiChat');
      }

      function loadDriveFilesPage() {
        showLoading();
        google.script.run.withSuccessHandler(function(html) {
          hideLoading();
          document.getElementById('app-content').innerHTML = html;
          M.AutoInit();
          loadDriveFiles();
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast('Erro ao carregar página de arquivos do Drive: ' + error.message, 'error');
        }).HtmlOutputRenderer.renderHtmlTemplate('DriveFiles');
      }

    </script>
  </body>
</html>
