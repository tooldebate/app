<!-- ProjectMetrics.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col s12">
          <h3 class="light-blue-text text-darken-4">Métricas Detalhadas do Projeto</h3>
          <div class="input-field">
            <select id="metricsProjectSelect">
              <!-- Projetos serão carregados aqui -->
            </select>
            <label>Selecione um Projeto</label>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col s12 m6">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Progresso do Projeto</h5>
            <canvas id="projectProgressChart"></canvas>
          </div>
        </div>
        <div class="col s12 m6">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Aderência e Compreensão</h5>
            <canvas id="adherenceUnderstandingChart"></canvas>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col s12">
          <div class="card-panel">
            <h5 class="light-blue-text text-darken-4">Distribuição de Tarefas por Responsável</h5>
            <canvas id="tasksByResponsibleChart"></canvas>
          </div>
        </div>
      </div>

    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var selects = document.querySelectorAll("select");
        M.FormSelect.init(selects);
        loadProjectsForMetricsSelect();

        document.getElementById("metricsProjectSelect").addEventListener("change", function() {
          var projectId = this.value;
          if (projectId) {
            loadProjectMetrics(projectId);
          } else {
            // Limpar gráficos ou exibir mensagem
          }
        });
      });

      function loadProjectsForMetricsSelect() {
        showLoading();
        google.script.run.withSuccessHandler(function(projects) {
          hideLoading();
          var select = document.getElementById("metricsProjectSelect");
          select.innerHTML = 
            `<option value="" disabled selected>Escolha um projeto</option>`;
          projects.forEach(function(project) {
            var option = document.createElement("option");
            option.value = project.ID;
            option.innerText = project.NomeProjeto;
            select.appendChild(option);
          });
          M.FormSelect.init(select);
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao carregar projetos para seleção: " + error.message, "error");
        }).apiGetAllProjects();
      }

      function loadProjectMetrics(projectId) {
        showLoading();
        google.script.run.withSuccessHandler(function(metrics) {
          hideLoading();
          if (metrics) {
            renderDoughnutChart("projectProgressChart", metrics.progressData, "Progresso do Projeto");
            renderBarChart("adherenceUnderstandingChart", metrics.adherenceUnderstandingData, "Aderência e Compreensão");
            renderBarChart("tasksByResponsibleChart", metrics.tasksByResponsibleData, "Distribuição de Tarefas por Responsável");
          } else {
            showToast("Nenhum dado de métricas disponível para este projeto.", "info");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro ao carregar métricas do projeto: " + error.message, "error");
        }).apiGetProjectMetrics(projectId); // Supondo uma API para obter métricas detalhadas do projeto
      }

      function renderDoughnutChart(canvasId, dataObject, title) {
        var ctx = document.getElementById(canvasId).getContext("2d");
        var labels = Object.keys(dataObject);
        var data = Object.values(dataObject);

        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: labels,
            datasets: [{
              label: title,
              data: data,
              backgroundColor: [
                "rgba(75, 192, 192, 0.6)", // Concluído
                "rgba(255, 206, 86, 0.6)", // Em Andamento
                "rgba(255, 99, 132, 0.6)"  // Pendente/Atrasado
              ],
              borderColor: [
                "rgba(75, 192, 192, 1)",
                "rgba(255, 206, 86, 1)",
                "rgba(255, 99, 132, 1)"
              ],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: "top",
              },
              title: {
                display: true,
                text: title
              }
            }
          }
        });
      }

      function renderBarChart(canvasId, dataObject, title) {
        var ctx = document.getElementById(canvasId).getContext("2d");
        var labels = Object.keys(dataObject);
        var data = Object.values(dataObject);

        new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [{
              label: title,
              data: data,
              backgroundColor: [
                "rgba(54, 162, 235, 0.6)",
                "rgba(153, 102, 255, 0.6)",
                "rgba(255, 159, 64, 0.6)"
              ],
              borderColor: [
                "rgba(54, 162, 235, 1)",
                "rgba(153, 102, 255, 1)",
                "rgba(255, 159, 64, 1)"
              ],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: "top",
              },
              title: {
                display: true,
                text: title
              }
            },
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      }
    </script>
  </body>
</html>
