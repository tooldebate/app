<!-- Login.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { display: flex; min-height: 100vh; flex-direction: column; justify-content: center; align-items: center; background-color: #f5f5f5; }
      .login-card { width: 350px; padding: 20px; box-shadow: 0 2px 2px 0 rgba(0,0,0,0.14), 0 3px 1px -2px rgba(0,0,0,0.12), 0 1px 5px 0 rgba(0,0,0,0.2); border-radius: 2px; background-color: white; }
      .login-card h4 { text-align: center; margin-bottom: 30px; color: #2196f3; }
      .input-field label { color: #2196f3; }
      .input-field input[type=text]:focus + label, .input-field input[type=password]:focus + label { color: #2196f3 !important; }
      .input-field input[type=text]:focus, .input-field input[type=password]:focus { border-bottom: 1px solid #2196f3 !important; box-shadow: 0 1px 0 0 #2196f3 !important; }
      .btn { width: 100%; margin-top: 20px; background-color: #2196f3; }
      .btn:hover { background-color: #1976d2; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h4>Login</h4>
      <form id="loginForm">
        <div class="row">
          <div class="input-field col s12">
            <i class="material-icons prefix">email</i>
            <input id="email" type="email" class="validate" required>
            <label for="email">Email</label>
          </div>
        </div>
        <div class="row">
          <div class="input-field col s12">
            <i class="material-icons prefix">lock</i>
            <input id="password" type="password" class="validate" required>
            <label for="password">Senha</label>
          </div>
        </div>
        <button class="btn waves-effect waves-light" type="submit" name="action">Entrar
          <i class="material-icons right">send</i>
        </button>
      </form>
    </div>

    <script>
      document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();
        showLoading();
        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;

        google.script.run.withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            showToast("Login bem-sucedido!", "success");
            loadApp(); // Recarrega a aplicação para o dashboard correto
          } else {
            showToast(result.message, "error");
          }
        }).withFailureHandler(function(error) {
          hideLoading();
          showToast("Erro no login: " + error.message, "error");
        }).apiLogin(email, password);
      });
    </script>
  </body>
</html>
